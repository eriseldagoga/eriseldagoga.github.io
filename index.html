<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eriselda's Website</title>
    <link rel="icon" href="data:," />
    
    <style>
        /* Minimalistic variables */
        :root {
            --bg-color: #fafafa;
            --text-main: #111827;
            --text-sub: #6b7280;
            --btn-bg: #111827;
            --btn-hover: #000000;
            --btn-text: #ffffff;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0;
            line-height: 1.1;
        }

        p.subtitle {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            color: var(--text-sub);
            margin-top: 1rem;
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        /* Segmented Grid Button */
        .grid-btn {
            display: inline-grid;
            grid-template-columns: auto 1fr auto;
            gap: 2px; /* 2px gap as requested */
            text-decoration: none;
            color: var(--btn-text);
        }

        .btn-part {
            background-color: var(--btn-bg);
            padding: 0.875rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-radius 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
        }

        /* Default states: Rounded ends, less rounded middle */
        .btn-part:first-child {
            border-radius: 16px 4px 4px 16px;
            padding-left: 1.5rem;
        }

        .btn-part:nth-child(2) {
            border-radius: 4px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.02em;
        }

        .btn-part:last-child {
            border-radius: 4px 16px 16px 4px;
            padding-right: 1.5rem;
        }

        /* Hover and Active states: Completely rounded corners */
        .grid-btn:hover .btn-part,
        .grid-btn:active .btn-part,
        .grid-btn:focus .btn-part {
            border-radius: 50px;
            background-color: var(--btn-hover);
        }

        /* Remove default focus outline for a custom one if needed */
        .grid-btn:focus {
            outline: none;
        }
    </style>
</head>
<body>

    <h1>Eriselda Goga</h1>
    <p class="subtitle">Welcome to my website.</p>

    <a href="https://eriseldagoga.com/teaching" class="grid-btn" aria-label="Course Notes">
        <span class="btn-part">📚</span>
        <span class="btn-part">Course Notes</span>
        <span class="btn-part">→</span>
    </a>

</body>
</html>
